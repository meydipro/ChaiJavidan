  <body>
    <div id="root"></div>
    <script type="module" src="/ChaiJavidan/src/main.jsx"></script>
    <script>
      // GitHub Pages SPA routing: parse redirect params from query string
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </body>
